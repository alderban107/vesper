# coturn TURN server configuration

listening-port=3478
tls-listening-port=5349

# Relay ports for WebRTC media
min-port=50000
max-port=50100

# Authentication — secret passed via CLI args in docker-compose.yml
use-auth-secret

# Realm
realm=vesper.local

# Logging
log-file=stdout
verbose

# Disable CLI
no-cli

# Fingerprint for TURN messages
fingerprint
