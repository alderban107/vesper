# coturn TURN server configuration

listening-port=3478
tls-listening-port=5349

# Relay ports for WebRTC media
min-port=50000
max-port=50100

# Authentication
use-auth-secret
static-auth-secret=${TURN_PASSWORD}

# Realm
realm=vesper.local

# Logging
log-file=stdout
verbose

# Disable CLI
no-cli

# Fingerprint for TURN messages
fingerprint

# Long-term credential mechanism
lt-cred-mech
